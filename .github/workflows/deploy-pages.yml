name: Deploy live-demos to Pages

# Publishes the live-demos folder as the site root, so every QR code in the book
# opens a short, clean URL. Demos live under /live-demos in the repo but are
# served from the root of the Pages site.

on:
  push:
    branches: [main]
    paths:
      - "live-demos/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./live-demos
      - id: deployment
        uses: actions/deploy-pages@v4
